<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 4.25 3.5" width="612" height="504">
  <title>sym-post-cap-cedar-pyramid</title>
  <desc>Cedar pyramid post cap — 4.25 in base (0.375 in overhang on 3.5 in post), vertical sides, brief shoulder ease, straight facets to peak. 1 unit = 1 inch.</desc>
  <defs>
    <linearGradient id="cedar-cap-shine" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#c4a878"/>
      <stop offset="45%" stop-color="#b8886b"/>
      <stop offset="100%" stop-color="#9a7550"/>
    </linearGradient>
    <pattern id="cedar-cap-grain" patternUnits="userSpaceOnUse" width="4.25" height="0.75">
      <path d="M 0 0.1875 L 4.25 0.1875" fill="none" stroke="#d4b078" stroke-width="0.03125" opacity="0.45"/>
      <path d="M 0 0.4375 L 4.25 0.4375" fill="none" stroke="#120908" stroke-width="0.03125" opacity="0.55"/>
      <path d="M 0 0.625 L 4.25 0.625" fill="none" stroke="#6b4f3a" stroke-width="0.03125" opacity="0.4"/>
    </pattern>
  </defs>
  <g id="sym-post-cap-cedar-pyramid">
    <g id="shell">
      <path fill="#000000" d="M 0 3.5 L 0 1.375 Q 0.0625 1.3125 0.125 1.25 L 2.125 0 L 4.125 1.25 Q 4.1875 1.3125 4.25 1.375 L 4.25 3.5 Z"/>
    </g>
    <g id="fill" data-slot="post-cap-material">
      <g data-post-cap-material="cedar">
        <path fill="url(#cedar-cap-shine)" d="M 0.1875 3.3125 L 0.1875 1.5 Q 0.21875 1.46875 0.25 1.4375 L 2.125 0.1875 L 4 1.4375 Q 4.03125 1.46875 4.0625 1.5 L 4.0625 3.3125 Z"/>
        <path fill="url(#cedar-cap-grain)" d="M 0.1875 3.3125 L 0.1875 1.5 Q 0.21875 1.46875 0.25 1.4375 L 2.125 0.1875 L 4 1.4375 Q 4.03125 1.46875 4.0625 1.5 L 4.0625 3.3125 Z"/>
      </g>
    </g>
  </g>
</svg>

        <path fill="url(#cedar-cap-grain)" d="M 0.1875 3.3125 L 4.0625 3.3125 L 4.0625 2.25 L 0.1875 2.25 Z"/>
        <path fill="url(#copper-cap-shine)" d="M 0.1875 2.25 L 4.0625 2.25 L 4.0625 1.5 Q 4.03125 1.46875 4 1.4375 L 2.125 0.1875 L 0.25 1.4375 Q 0.21875 1.46875 0.1875 1.5 Z"/>
        <path fill="url(#copper-cap-highlight)" opacity="0.55" d="M 0.1875 2.25 L 1.4375 1.125 L 2.125 0.1875 L 0.25 1.4375 Q 0.21875 1.46875 0.1875 1.5 Z"/>

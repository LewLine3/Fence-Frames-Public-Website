      <stop offset="45%" stop-color="#b8886b"/>
      <stop offset="100%" stop-color="#9a7550"/>
    </linearGradient>
    <pattern id="cedar-cap-grain" patternUnits="userSpaceOnUse" width="4.25" height="0.75">
      <path d="M 0 0.1875 L 4.25 0.1875" fill="none" stroke="#d4b078" stroke-width="0.03125" opacity="0.45"/>
      <path d="M 0 0.4375 L 4.25 0.4375" fill="none" stroke="#120908" stroke-width="0.03125" opacity="0.55"/>
    </pattern>
    <linearGradient id="copper-cap-shine" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#e8b87a"/>
      <stop offset="28%" stop-color="#c97840"/>
      <stop offset="58%" stop-color="#b87333"/>
      <stop offset="100%" stop-color="#8b5a2b"/>
    </linearGradient>
    <linearGradient id="copper-cap-highlight" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">

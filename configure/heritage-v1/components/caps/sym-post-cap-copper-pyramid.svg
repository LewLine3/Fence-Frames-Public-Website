<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 4.25 3.5" width="612" height="504">
  <title>sym-post-cap-copper-pyramid</title>
  <desc>Wood post cap with copper pyramid lid — cedar block base, straight copper peak with brief shoulder ease. Ref: Protectyte TRADC0358M.</desc>
  <defs>

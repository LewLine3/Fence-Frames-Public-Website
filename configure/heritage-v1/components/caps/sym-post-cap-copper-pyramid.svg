    <g id="shell">
      <path fill="#000000" d="M 0 3.5 L 0 2.0625 L 0 1.375 Q 0.0625 1.3125 0.125 1.25 L 2.125 0 L 4.125 1.25 Q 4.1875 1.3125 4.25 1.375 L 4.25 2.0625 L 4.25 3.5 Z"/>
    </g>

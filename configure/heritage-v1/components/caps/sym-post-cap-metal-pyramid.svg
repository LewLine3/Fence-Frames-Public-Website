      <stop offset="0%" stop-color="#5c6370"/>
      <stop offset="35%" stop-color="#374151"/>
      <stop offset="72%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="metal-cap-edge" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#6b7280" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#111827" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <g id="sym-post-cap-metal-pyramid"

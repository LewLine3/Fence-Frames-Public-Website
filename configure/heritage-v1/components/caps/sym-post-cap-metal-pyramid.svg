        <path fill="url(#metal-cap-edge)" opacity="0.65" d="M 0.1875 1.5 L 0.1875 3.3125 L 1.0625 2.875 L 1.9375 0.1875 L 1.4375 1.125 L 0.25 1.4375 Q 0.21875 1.46875 0.1875 1.5 Z"/>
